name: Package and release gems with precompiled binaries

on:
  # Manual dry-run / opt-in publish.
  workflow_dispatch:
    inputs:
      release:
        description: "If the whole build passes on all platforms, publish to RubyGems.org"
        required: false
        type: boolean
        default: false
  # Tag push always releases.
  push:
    tags:
      - v[0-9]+.[0-9]+.[0-9]+
      - v[0-9]+.[0-9]+.[0-9]+.beta[0-9]*

jobs:
  compile:
    timeout-minutes: 30
    name: Compile (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-22.04
          - ubuntu-22.04-arm
          - macos-latest
          - macos-15-intel
    runs-on: ${{ matrix.os }}
    env:
      # macOS 15+ ld silently ignores `-undefined,dynamic_lookup` for
      # Ruby symbols, breaking the link. `-flat_namespace` together with
      # `dynamic_lookup` restores the old behavior we depend on.
      RUSTFLAGS: ${{ startsWith(matrix.os, 'macos') && '-C link-arg=-Wl,-flat_namespace -C link-arg=-Wl,-undefined,dynamic_lookup' || '' }}
      MACOSX_DEPLOYMENT_TARGET: '11.0'
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
      - uses: shopify/cibuildgem/.github/actions/cibuildgem@main
        with:
          step: compile

  test:
    timeout-minutes: 20
    name: Test (${{ matrix.os }}, Ruby ${{ matrix.ruby }}, ${{ matrix.type }})
    needs: compile
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-22.04
          - ubuntu-22.04-arm
          - macos-latest
          - macos-15-intel
        ruby: ['3.3', '3.4', '4.0']
        type: [cross, native]
    runs-on: ${{ matrix.os }}
    env:
      RUSTFLAGS: ${{ startsWith(matrix.os, 'macos') && '-C link-arg=-Wl,-flat_namespace -C link-arg=-Wl,-undefined,dynamic_lookup' || '' }}
      MACOSX_DEPLOYMENT_TARGET: '11.0'
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - uses: shopify/cibuildgem/.github/actions/cibuildgem@main
        with:
          step: test_${{ matrix.type }}

  install:
    timeout-minutes: 10
    name: Verify gem installs (${{ matrix.os }})
    needs: test
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-22.04
          - ubuntu-22.04-arm
          - macos-latest
          - macos-15-intel
    runs-on: ${{ matrix.os }}
    env:
      # `install` exercises the source-gem path on hosts without a
      # prebuilt platform gem, which triggers a fresh cargo build.
      # Apply the same macOS linker workaround compile/test need.
      RUSTFLAGS: ${{ startsWith(matrix.os, 'macos') && '-C link-arg=-Wl,-flat_namespace -C link-arg=-Wl,-undefined,dynamic_lookup' || '' }}
      MACOSX_DEPLOYMENT_TARGET: '11.0'
    steps:
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
      - uses: shopify/cibuildgem/.github/actions/cibuildgem@main
        with:
          step: install

  release:
    name: Publish to RubyGems
    needs: install
    if: >-
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) ||
      (github.event_name == 'workflow_dispatch' && inputs.release)
    environment: release
    permissions:
      id-token: write
      contents: read
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
      - uses: shopify/cibuildgem/.github/actions/cibuildgem@main
        with:
          step: release

  release_github:
    name: Create GitHub release
    needs: release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: "${{ github.ref_name }}",
              name: "${{ github.ref_name }}".replace(/^v/, ""),
              generate_release_notes: true,
              prerelease: "${{ github.ref_name }}".includes(".beta")
            });
